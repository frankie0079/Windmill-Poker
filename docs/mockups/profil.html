<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spieler-Profil — kanonisches Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@400;600;700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:32px 24px;background:#1a1a2e;font-family:'Work Sans',sans-serif;color:#F2E7CE}
  .frame{background:#F2E7CE;background-image:radial-gradient(rgba(14,26,26,.04) 1px,transparent 1px),radial-gradient(rgba(14,26,26,.03) 1px,transparent 1px);background-size:3px 3px,7px 7px;border-radius:14px;border:2px solid #0E1A1A;overflow:hidden;color:#0E1A1A;width:375px;margin:0 auto}
  .header{background:#C94A2B;color:#F2E7CE;padding:0 16px;display:flex;align-items:center;gap:12px;justify-content:center;height:80px;overflow:hidden}
  .logo{width:60px;height:80px;display:flex;align-items:center;justify-content:center;font-family:'Alfa Slab One',serif;font-size:38px;line-height:1}
  .brand{font-family:'Alfa Slab One',serif;font-size:22px;letter-spacing:0.02em;line-height:1;white-space:nowrap}
  .scroll-warm::-webkit-scrollbar{width:4px;height:4px}
  .scroll-warm::-webkit-scrollbar-track{background:transparent}
  .scroll-warm::-webkit-scrollbar-thumb{background:#C4A882;border-radius:4px}
  .scroll-warm::-webkit-scrollbar-thumb:hover{background:#A8906A}
  .bottomtabs{border-top:2px solid rgba(14,26,26,0.35);display:flex;background:#E8D9B5}
  .bt{flex:1;text-align:center;padding:10px 4px;font-size:10px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.1em;color:#3A4747}
  .bt .ico{font-size:18px;margin-bottom:2px;display:block}
</style>
</head>
<body>

<div class="frame">
  <div class="header"><div class="logo">♠</div><span class="brand">WINDMILL POKER</span></div>

  <!-- Spieler Profil -->
  <div style="padding:12px">

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:18px;cursor:pointer;color:#6A7575">◀</span>
      <span style="font-family:'Alfa Slab One',serif;font-size:24px;color:#1E4A3C">Frank</span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:6px">
      <div style="flex:1;text-align:center">
        <span style="background:#C94A2B;color:#F2E7CE;padding:3px 10px;border-radius:5px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em">PLATZ 1</span>
      </div>
      <div style="flex:1;text-align:center"></div>
      <div style="flex:1;text-align:center">
        <span style="background:#1E4A3C;color:#F2E7CE;padding:3px 10px;border-radius:5px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em">PLATZ 1</span>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1;background:#FFFCF4;border:2px solid #0E1A1A;border-radius:8px;padding:10px;text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#C94A2B;letter-spacing:0.04em">590€</div>
        <div style="font-family:'Oswald',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:#6A7575;margin-top:2px">Gesamt</div>
      </div>
      <div style="flex:1;background:#FFFCF4;border:2px solid #0E1A1A;border-radius:8px;padding:10px;text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#0E1A1A">11</div>
        <div style="font-family:'Oswald',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:#6A7575;margin-top:2px">Spieltage</div>
      </div>
      <div style="flex:1;background:#FFFCF4;border:2px solid #0E1A1A;border-radius:8px;padding:10px;text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#1E4A3C;letter-spacing:0.04em">53,64€</div>
        <div style="font-family:'Oswald',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:#6A7575;margin-top:2px">€/Spieltag</div>
      </div>
    </div>

    <div style="font-family:'Oswald',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:#6A7575;font-weight:600;margin-bottom:6px">Entwicklung</div>
    <div class="scroll-warm" style="background:#FFFCF4;border:2px solid #0E1A1A;border-radius:8px;padding:10px 10px 6px;margin-bottom:14px;overflow-x:auto">
      <div style="display:flex;align-items:flex-end;gap:4px;height:80px;min-width:max-content">
        <!-- Bar pro Spieltag, Höhe = pct vom max-Wert -->
        <!-- Farbcode: 0 = #6A7575, Tagessieg = #C94A2B, sonst = #E9B63A -->
        <!-- Jahreswechsel: schmaler vertikaler Strich mit opacity 0.25 -->
        <!-- Label unter Bar: Monat (Oswald 9px), Jahr (Oswald 7px nur bei Wechsel) -->
        <div style="min-width:28px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="width:100%;background:#E9B63A;border-radius:3px 3px 0 0;height:40%"></div>
          <div style="font-size:9px;color:#6A7575;margin-top:3px;font-family:'Oswald',sans-serif">01</div>
          <div style="font-size:7px;color:#0E1A1A;font-family:'Oswald',sans-serif">2025</div>
        </div>
        <!-- weitere Bars analog ... -->
      </div>
    </div>

    <div style="font-family:'Oswald',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:#6A7575;font-weight:600;margin-bottom:6px">Spieltage</div>
    <div class="scroll-warm" style="max-height:180px;overflow-y:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="font-family:'Oswald',sans-serif;font-weight:600">
          <td style="padding:6px 2px;border-bottom:1px solid rgba(14,26,26,0.15)">05.03.26</td>
          <td style="padding:6px 14px 6px 2px;border-bottom:1px solid rgba(14,26,26,0.15);text-align:right;color:#C94A2B;font-weight:700;font-size:13px">90€</td>
        </tr>
        <tr style="font-family:'Oswald',sans-serif;font-weight:600">
          <td style="padding:6px 2px;border-bottom:1px solid rgba(14,26,26,0.15)">19.02.26</td>
          <td style="padding:6px 14px 6px 2px;border-bottom:1px solid rgba(14,26,26,0.15);text-align:right;font-size:13px">30€</td>
        </tr>
        <tr style="font-family:'Oswald',sans-serif;font-weight:600">
          <td style="padding:6px 2px;border-bottom:1px solid rgba(14,26,26,0.15)">15.01.26</td>
          <td style="padding:6px 14px 6px 2px;border-bottom:1px solid rgba(14,26,26,0.15);text-align:right;font-size:13px">70€</td>
        </tr>
        <!-- weitere Zeilen analog, neueste oben, 0€ in mist (#6A7575), Tagessieg in rust + bold -->
      </table>
    </div>

  </div>

  <div class="bottomtabs">
    <div class="bt"><span class="ico">📊</span>Ranking</div>
    <div class="bt"><span class="ico">📅</span>Spieltage</div>
    <div class="bt"><span class="ico">👤</span>Spieler</div>
    <div class="bt"><span class="ico">⚙️</span>Admin</div>
  </div>
</div>

</body>
</html>
